[llm]
force_temp_response = false
temp_response_text = This is a temp response.
provider = ollama
backend = langchain
ollama_base_url = http://127.0.0.1:11434
ollama_model = mistral
openai_model = gpt-4o-mini
temperature = 0.4
timeout_seconds = 120
history_strategy = full
recent_history_limit = 8

[stt]
provider = faster_whisper
model = medium
compute_type = int8

[tts]
provider = edge_tts
voice = en-US-AriaNeural

